# Kibo CSR Assessment - Cross-platform (Windows, Linux, Mac)
# Run: docker-compose up --build
# Requires: LLM_API_KEY environment variable

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - LLM_API_KEY=${LLM_API_KEY}
      - ConnectionStrings__Default=Data Source=/data/kibo.db
    volumes:
      - kibo-data:/data
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  kibo-data:
